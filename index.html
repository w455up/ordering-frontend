<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>叙叙 chat chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #C8281A;
      --red-dark: #A01E12;
      --red-light: #F8EAE8;
      --cream: #F2EDDF;
      --cream-dark: #E8E0CC;
      --text: #2A1A17;
      --muted: #8C7068;
      --border: rgba(200,40,26,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; padding-bottom: 100px; }

    .top-bar { background: var(--cream); padding: 14px 20px 0; position: sticky; top: 0; z-index: 90; }
    .logo-area { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1.5px solid var(--border); }
    .logo-wrap img { height: 52px; width: auto; display: block; }
    .table-badge { background: var(--red); color: white; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; padding: 5px 12px; border-radius: 20px; }

    .tabs-wrap { background: var(--cream); padding: 12px 0 10px 20px; overflow-x: auto; white-space: nowrap; position: sticky; top: 80px; z-index: 89; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tab { display: inline-block; margin-right: 8px; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.03em; cursor: pointer; border: 1.5px solid var(--cream-dark); background: white; color: var(--muted); transition: all 0.2s; }
    .tab.active { background: var(--red); border-color: var(--red); color: white; }

    .section { padding: 0 16px; margin-top: 20px; }
    .section-label { font-family: 'Noto Serif TC', serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; padding-left: 4px; }

    .card-list { display: flex; flex-direction: column; gap: 6px; }
    .card { background: white; border-radius: 14px; padding: 14px 14px 14px 16px; display: flex; align-items: flex-start; gap: 12px; position: relative; overflow: hidden; transition: transform 0.12s; }
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cream-dark); border-radius: 3px 0 0 3px; }
    .card:active { transform: scale(0.985); }
    .card-emoji { font-size: 2.2rem; flex-shrink: 0; width: 52px; height: 52px; background: var(--cream); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
    .card-desc { font-size: 0.78rem; color: var(--muted); font-weight: 300; line-height: 1.4; margin-bottom: 6px; }
    .card-price { font-size: 0.85rem; font-weight: 500; color: var(--red); }
    .card-price::before { content: "$"; font-size: 0.7rem; vertical-align: top; margin-top: 1px; display: inline-block; }
    .card-action { flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; }
    .add-btn { width: 34px; height: 34px; background: var(--red); color: white; border: none; border-radius: 50%; font-size: 1.3rem; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; }
    .add-btn:active { background: var(--red-dark); transform: scale(0.9); }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--cream-dark); background: white; color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:active { background: var(--cream); }
    .qty-num { font-size: 0.9rem; font-weight: 500; min-width: 18px; text-align: center; }
    .sold-out-tag { font-size: 0.68rem; background: #e0d8cc; color: #8C7068; padding: 3px 8px; border-radius: 10px; }
    .card-sold-out { opacity: 0.5; pointer-events: none; }
    .card-sold-out::before { background: #ccc; }

    .cart-pill-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px 20px; background: linear-gradient(to top, var(--cream) 70%, transparent); z-index: 100; }
    .cart-pill { background: var(--red); color: white; border: none; border-radius: 18px; width: 100%; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .cart-pill:active { background: var(--red-dark); }
    .cart-pill-left { display: flex; align-items: center; gap: 10px; }
    .cart-bubble { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
    .cart-pill-label { font-size: 0.95rem; font-weight: 500; }
    .cart-pill-total { font-size: 0.9rem; font-weight: 300; }
    .cart-pill-total strong { font-weight: 600; }
    .cart-pill-wrap.hidden { display: none; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(42,26,23,0.4); z-index: 200; backdrop-filter: blur(2px); }
    .overlay.open { display: block; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; z-index: 300; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); padding-bottom: env(safe-area-inset-bottom, 20px); }
    .sheet.open { transform: translateY(0); }
    .sheet-handle-wrap { padding: 12px 0 0; display: flex; justify-content: center; }
    .sheet-handle { width: 36px; height: 4px; background: var(--cream-dark); border-radius: 2px; }
    .sheet-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--cream-dark); display: flex; align-items: center; justify-content: space-between; }
    .sheet-title { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; }
    .sheet-subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .sheet-body { padding: 8px 20px 0; }
    .cart-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--cream); }
    .cart-row-name { flex: 1; font-size: 0.88rem; font-weight: 500; }
    .cart-row-price { font-size: 0.88rem; font-weight: 500; color: var(--red); min-width: 54px; text-align: right; }
    .field-block { margin: 14px 0 0; }
    .field-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
    .field-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--cream-dark); border-radius: 10px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); outline: none; }
    .field-input:focus { border-color: var(--red); background: white; }
    .guest-row { display: flex; align-items: center; justify-content: space-between; margin: 14px 0; padding: 12px 14px; background: var(--cream); border-radius: 10px; }
    .guest-label { font-size: 0.85rem; font-weight: 500; }
    .guest-ctrl { display: flex; align-items: center; gap: 10px; }
    .guest-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--cream-dark); background: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .guest-num { font-weight: 600; min-width: 20px; text-align: center; }
    .total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 0; margin-top: 6px; border-top: 1.5px solid var(--cream-dark); }
    .total-label { font-size: 0.8rem; letter-spacing: 0.05em; color: var(--muted); }
    .total-amount { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; font-weight: 700; color: var(--red); }
    .total-amount::before { content: "$"; font-size: 0.85rem; vertical-align: super; margin-right: 1px; }
    .submit-btn { width: 100%; background: var(--red); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.04em; font-family: 'DM Sans', sans-serif; cursor: pointer; margin: 0 0 20px; transition: background 0.2s; }
    .submit-btn:active { background: var(--red-dark); }
    .submit-btn:disabled { background: #ccc; }

    .success-screen { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 32px; }
    .success-screen.show { display: flex; }
    .success-logo { margin-bottom: 28px; }
    .success-logo img { height: 72px; }
    .success-icon { width: 72px; height: 72px; background: var(--red-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; }
    .success-title { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .success-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .success-id { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 36px; }
    .new-order-btn { background: var(--red); color: white; border: none; padding: 14px 36px; border-radius: 14px; font-size: 0.9rem; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }

    #loading { display: none; position: fixed; inset: 0; background: rgba(242,237,223,0.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    #loading.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--cream-dark); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.06em; }
    .error-screen { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo-area">
    <div class="logo-wrap" id="logo-wrap"></div>
    <div class="table-badge" id="table-badge">桌號 · ...</div>
  </div>
</div>

<div class="tabs-wrap" id="tabs-wrap">
  <span class="tab active" onclick="filterCat('all',this)">全部</span>
</div>

<div id="menu-sections">
  <div class="section">
    <div style="text-align:center;padding:50px;color:var(--muted);font-size:0.85rem;">載入菜單中…</div>
  </div>
</div>

<div class="cart-pill-wrap hidden" id="cart-pill-wrap">
  <button class="cart-pill" onclick="openSheet()">
    <div class="cart-pill-left">
      <span class="cart-bubble" id="pill-count">0</span>
      <span class="cart-pill-label">查看訂單</span>
    </div>
    <span class="cart-pill-total">合計 <strong id="pill-total">$0</strong></span>
  </button>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div>
      <div class="sheet-title">我的訂單</div>
      <div class="sheet-subtitle" id="sheet-table-sub">桌號 · ...</div>
    </div>
  </div>
  <div class="sheet-body">
    <div id="sheet-items"></div>
    <div class="field-block">
      <div class="field-label">備　　　 註</div>
      <input class="field-input" type="text" id="note" maxlength="80" placeholder="例：不加蔥、少冰…"/>
    </div>
    <div class="guest-row">
      <span class="guest-label">用餐人數</span>
      <div class="guest-ctrl">
        <button class="guest-btn" onclick="changeGuest(-1)">−</button>
        <span class="guest-num" id="guest-num">1</span>
        <button class="guest-btn" onclick="changeGuest(1)">+</button>
      </div>
    </div>
    <div class="total-row">
      <span class="total-label">TOTAL</span>
      <span class="total-amount" id="sheet-total">0</span>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()" disabled>確認送出</button>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-logo" id="success-logo"></div>
  <div class="success-icon">✓</div>
  <div class="success-title">訂單已送出！</div>
  <p class="success-sub">我們正在為您準備<br/>請稍候片刻，謝謝</p>
  <p class="success-id" id="success-id">ORDER #------</p>
  <button class="new-order-btn" onclick="resetAll()">繼續點餐</button>
</div>

<div id="loading"><div class="spinner"></div><p>送出中…</p></div>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//Z";
document.getElementById("logo-wrap").innerHTML = `<img src="${LOGO_SRC}" alt="叙叙 chat chat"/>`;
document.getElementById("success-logo").innerHTML = `<img src="${LOGO_SRC}" alt="叙叙"/>`;

let cart = {};
let menuItems = [];
let guestCount = 1;
const tableId = new URLSearchParams(location.search).get("table") || "外帶";
document.getElementById("table-badge").textContent = `桌 ${tableId}`;
document.getElementById("sheet-table-sub").textContent = `桌號 · ${tableId}`;

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/menu`);
    const data = await res.json();
    menuItems = data.items;
    document.title = data.restaurant_name || "叙叙 chat chat";
    renderMenu(menuItems);
  } catch(e) {
    document.getElementById("menu-sections").innerHTML =
      `<div class="error-screen">無法載入菜單<br/>請確認 API_BASE 網址是否正確</div>`;
  }
}

function getCategories(items) { return [...new Set(items.map(i => i.category))]; }

function renderMenu(items) {
  const cats = getCategories(items);
  const tabs = document.getElementById("tabs-wrap");
  tabs.innerHTML = `<span class="tab active" onclick="filterCat('all',this)">全部</span>` +
    cats.map(c => `<span class="tab" onclick="filterCat('${c}',this)">${c}</span>`).join("");

  const sec = document.getElementById("menu-sections");
  sec.innerHTML = cats.map(cat => {
    const catItems = items.filter(i => i.category === cat);
    return `<div class="section cat-section" data-cat="${cat}">
      <div class="section-label">${cat}</div>
      <div class="card-list">
        ${catItems.map(item => {
          const soldOut = item.available === false;
          const qty = cart[item.id]?.qty || 0;
          return `<div class="card ${soldOut ? 'card-sold-out' : ''}">
            <div class="card-emoji">${item.emoji || "🍽️"}</div>
            <div class="card-body">
              <div class="card-name">${item.name}</div>
              ${item.description ? `<div class="card-desc">${item.description}</div>` : ""}
              <div class="card-price">${item.price}</div>
            </div>
            <div class="card-action">
              ${soldOut ? `<span class="sold-out-tag">售完</span>` :
                qty > 0 ?
                  `<div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},-1)">−</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},1)">+</button>
                  </div>` :
                  `<button class="add-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},1)">+</button>`
              }
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");
}

function filterCat(cat, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".cat-section").forEach(s => {
    s.style.display = (cat === "all" || s.dataset.cat === cat) ? "" : "none";
  });
}

function changeQty(id, name, price, delta) {
  if (!cart[id]) cart[id] = { name, price, qty: 0 };
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  updateAll();
}

function updateAll() {
  const total = Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
  const count = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  document.getElementById("cart-pill-wrap").classList.toggle("hidden", count === 0);
  document.getElementById("pill-count").textContent = count;
  document.getElementById("pill-total").textContent = `$${total}`;
  document.getElementById("sheet-total").textContent = total;
  document.getElementById("submit-btn").disabled = count === 0;

  const itemsEl = document.getElementById("sheet-items");
  if (!Object.keys(cart).length) {
    itemsEl.innerHTML = `<div style="padding:20px 0;text-align:center;color:var(--muted);font-size:0.85rem;">購物車是空的</div>`;
  } else {
    itemsEl.innerHTML = Object.entries(cart).map(([id, item]) =>
      `<div class="cart-row">
        <span class="cart-row-name">${item.name}</span>
        <div class="qty-ctrl" style="gap:8px;">
          <button class="qty-btn" onclick="changeQty('${id}','${item.name}',${item.price},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${id}','${item.name}',${item.price},1)">+</button>
        </div>
        <span class="cart-row-price">$${item.price * item.qty}</span>
      </div>`
    ).join("");
  }

  document.querySelectorAll(".card:not(.card-sold-out)").forEach(card => {
    const name = card.querySelector(".card-name")?.textContent;
    const item = menuItems.find(m => m.name === name);
    if (!item) return;
    const qty = cart[item.id]?.qty || 0;
    const actionEl = card.querySelector(".card-action");
    if (qty > 0) {
      actionEl.innerHTML = `<div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},1)">+</button>
      </div>`;
    } else {
      actionEl.innerHTML = `<button class="add-btn" onclick="changeQty('${item.id}','${item.name}',${item.price},1)">+</button>`;
    }
  });
}

function changeGuest(d) {
  guestCount = Math.max(1, guestCount + d);
  document.getElementById("guest-num").textContent = guestCount;
}
function openSheet() { document.getElementById("sheet").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeSheet() { document.getElementById("sheet").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }

async function submitOrder() {
  const items = Object.entries(cart).map(([id, item]) => ({
    menu_item_id: id, name: item.name, price: item.price, qty: item.qty
  }));
  if (!items.length) return;
  document.getElementById("loading").classList.add("show");
  try {
    const res = await fetch(`${API_BASE}/api/order`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ table_id: tableId, guest_count: guestCount, note: document.getElementById("note").value, items })
    });
    const data = await res.json();
    if (res.ok) {
      closeSheet();
      document.getElementById("success-id").textContent = `ORDER #${data.order_id.slice(-6).toUpperCase()}`;
      document.getElementById("success-screen").classList.add("show");
    } else { alert("訂單送出失敗：" + (data.error || "請再試一次")); }
  } catch(e) { alert("網路錯誤，請確認連線後再試。"); }
  finally { document.getElementById("loading").classList.remove("show"); }
}

function resetAll() {
  cart = {}; guestCount = 1;
  document.getElementById("guest-num").textContent = "1";
  document.getElementById("note").value = "";
  document.getElementById("success-screen").classList.remove("show");
  updateAll(); loadMenu();
}

loadMenu();
</script>
