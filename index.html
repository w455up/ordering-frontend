<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
  <title>叙叙 chat chat</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;600&amp;family=Noto+Serif+TC:wght@400;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style type="text/tailwindcss">
    @layer utilities {
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
    :root {
      --bg-cream: #F2EDDF;
      --bg-cream-dark: #E8E0CC;
      --text-main: #2A1A17;
      --text-muted: #8C7068;
      --accent-red: #C8281A;
      --accent-red-dark: #A01E12;
      --accent-red-light: #F8EAE8;
      --border-color: rgba(200, 40, 26, 0.15);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-cream);
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }
    h1, h2, h3, h4, h5, h6, .serif {
      font-family: 'Noto Serif TC', serif;
    }
    .card-shadow {
      box-shadow: 0 4px 20px rgba(42, 26, 23, 0.04);
    }
    .mask-gradient-right {
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }
</style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="min-h-screen pb-32">
  <header
    class="sticky top-0 z-40 bg-[var(--bg-cream)]/95 backdrop-blur-md border-b border-[var(--border-color)] px-5 py-3 transition-all duration-300">
    <div class="flex items-center justify-between mb-3">
      <img alt="叙叙 chat chat" class="h-10 w-auto object-contain" id="header-logo"
        src="image\logo\1.png" />
      <div class="flex gap-1 bg-white/50 p-1 rounded-full border border-[var(--bg-cream-dark)]">
        <button class="px-3 py-1 rounded-full text-xs font-medium bg-[var(--accent-red)] text-white transition-colors"
          id="lang-zh" onclick="switchLang('zh')">繁</button>
        <button
          class="px-3 py-1 rounded-full text-xs font-medium text-[var(--text-muted)] hover:bg-white/80 transition-colors"
          id="lang-en" onclick="switchLang('en')">EN</button>
        <button
          class="px-3 py-1 rounded-full text-xs font-medium text-[var(--text-muted)] hover:bg-white/80 transition-colors"
          id="lang-jp" onclick="switchLang('jp')">JP</button>
        <button
          class="px-3 py-1 rounded-full text-xs font-medium text-[var(--text-muted)] hover:bg-white/80 transition-colors"
          id="lang-ko" onclick="switchLang('ko')">한국어</button>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold serif text-[var(--text-main)] tracking-wide" id="restaurant-name-display">叙叙 chat
          chat</h1>
        <div class="flex items-center gap-2 text-xs text-[var(--text-muted)] mt-0.5">
          <span class="material-symbols-outlined text-[14px]">table_restaurant</span>
          <span id="header-table-info">桌號 · ...</span>
        </div>
      </div>
      <div
        class="w-8 h-8 rounded-full bg-white border border-[var(--bg-cream-dark)] flex items-center justify-center text-[var(--accent-red)]">
        <span class="material-symbols-outlined text-[18px]">notifications</span>
      </div>
    </div>
  </header>
  <nav
    class="sticky top-[89px] z-30 bg-[var(--bg-cream)] pt-2 pb-4 pl-5 overflow-x-auto no-scrollbar whitespace-nowrap mask-gradient-right"
    id="category-nav">
    <div class="inline-flex gap-2 pr-5" id="tabs-wrap">
    </div>
  </nav>
  <main class="px-5 pt-2" id="menu-sections">
    <div class="flex flex-col items-center justify-center py-20 text-[var(--text-muted)]">
      <div class="w-10 h-10 border-2 border-[var(--accent-red)] border-t-transparent rounded-full animate-spin mb-4">
      </div>
      <p class="text-sm tracking-wider" data-i18n="loading">載入菜單中...</p>
    </div>
  </main>
  <div
    class="fixed bottom-0 left-0 right-0 p-5 z-50 bg-gradient-to-t from-[var(--bg-cream)] via-[var(--bg-cream)] to-transparent pt-10 pointer-events-none transition-transform duration-300 translate-y-full"
    id="cart-bar">
    <button
      class="pointer-events-auto w-full bg-[var(--text-main)] text-[var(--bg-cream)] rounded-2xl p-4 shadow-xl flex items-center justify-between active:scale-[0.98] transition-all"
      onclick="openCart()">
      <div class="flex items-center gap-3">
        <div
          class="bg-[var(--accent-red)] text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center"
          id="cart-count">0</div>
        <span class="font-medium" data-i18n="view_order">查看訂單</span>
      </div>
      <div class="flex items-baseline gap-1">
        <span class="text-sm opacity-80" data-i18n="total">Total</span>
        <span class="text-xl font-bold serif" id="cart-total">$0</span>
      </div>
    </button>
  </div>
  <div class="fixed inset-0 bg-black/40 z-[60] hidden opacity-0 transition-opacity duration-300" id="upsell-overlay"
    onclick="closeUpsell()"></div>
  <div
    class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-[70] transform translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col"
    id="upsell-sheet">
    <div class="w-full h-1.5 bg-gray-200 rounded-full w-12 mx-auto mt-3 mb-5"></div>
    <div class="px-6 pb-4 border-b border-gray-100">
      <h3 class="serif text-xl font-bold text-[var(--text-main)] mb-1" data-i18n="upsell_title">升級套餐?</h3>
      <p class="text-sm text-[var(--text-muted)]" data-i18n="upsell_desc">搭配飲品或小菜更划算</p>
    </div>
    <div class="overflow-y-auto p-6 space-y-4 no-scrollbar">
      <label
        class="flex items-center justify-between p-4 border border-[var(--bg-cream-dark)] rounded-xl has-[:checked]:border-[var(--accent-red)] has-[:checked]:bg-[var(--accent-red-light)] transition-colors cursor-pointer group">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-[var(--bg-cream)] rounded-lg flex items-center justify-center text-2xl">🥤</div>
          <div>
            <div class="font-bold text-[var(--text-main)]" data-i18n="drink">經典飲品</div>
            <div class="text-xs text-[var(--text-muted)]" data-i18n="upsell_drink_desc">Drink (+$30)</div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm font-medium text-[var(--accent-red)]">+$30</span>
          <input class="w-5 h-5 text-[var(--accent-red)] rounded border-gray-300 focus:ring-[var(--accent-red)]"
            onchange="toggleUpsell(this, 30)" type="checkbox" value="drink" />
        </div>
      </label>
      <label
        class="flex items-center justify-between p-4 border border-[var(--bg-cream-dark)] rounded-xl has-[:checked]:border-[var(--accent-red)] has-[:checked]:bg-[var(--accent-red-light)] transition-colors cursor-pointer group">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-[var(--bg-cream)] rounded-lg flex items-center justify-center text-2xl">🥟</div>
          <div>
            <div class="font-bold text-[var(--text-main)]" data-i18n="side">精緻小菜</div>
            <div class="text-xs text-[var(--text-muted)]" data-i18n="upsell_side_desc">Side Dish (+$50)</div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm font-medium text-[var(--accent-red)]">+$50</span>
          <input class="w-5 h-5 text-[var(--accent-red)] rounded border-gray-300 focus:ring-[var(--accent-red)]"
            onchange="toggleUpsell(this, 50)" type="checkbox" value="side" />
        </div>
      </label>
    </div>
    <div class="p-5 border-t border-gray-100 bg-white pb-safe">
      <button
        class="w-full bg-[var(--text-main)] text-white py-4 rounded-xl font-medium text-lg active:scale-[0.98] transition-transform"
        data-i18n="add_to_cart" onclick="confirmUpsell()">
        加入購物車
      </button>
      <button class="w-full py-3 mt-2 text-sm text-[var(--text-muted)] font-medium" data-i18n="no_thanks"
        onclick="closeUpsell()"> </button>
    </div>
  </div>
  <div class="fixed inset-0 bg-black/40 z-[80] hidden opacity-0 transition-opacity duration-300" id="cart-overlay"
    onclick="closeCart()"></div>
  <div
    class="fixed inset-x-0 bottom-0 bg-white rounded-t-3xl z-[90] transform translate-y-full transition-transform duration-300 h-[90vh] flex flex-col"
    id="cart-sheet">
    <div class="flex items-center justify-between p-5 border-b border-gray-100">
      <h2 class="serif text-xl font-bold" data-i18n="my_order">我的訂單</h2>
      <button class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full" onclick="closeCart()">
        <span class="material-symbols-outlined text-sm">close</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-5 no-scrollbar" id="cart-items-container">
    </div>
    <div class="bg-[var(--bg-cream)] p-5 border-t border-[var(--bg-cream-dark)] space-y-4 pb-safe">
      <div>
        <label class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-wider mb-2 block"
          data-i18n="note">備註 Note</label>
        <input
          class="w-full bg-white border border-[var(--bg-cream-dark)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[var(--accent-red)]"
          id="order-note" placeholder="不加蔥、少冰..." type="text" />
      </div>
      <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-[var(--bg-cream-dark)]">
        <span class="text-sm font-bold text-[var(--text-main)] px-2" data-i18n="guest_count">用餐人數</span>
        <div class="flex items-center gap-4">
          <button class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center active:bg-gray-50"
            onclick="updateGuest(-1)">−</button>
          <span class="font-bold w-4 text-center" id="guest-count">1</span>
          <button class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center active:bg-gray-50"
            onclick="updateGuest(1)">+</button>
        </div>
      </div>
      <div class="flex items-center justify-between pt-2">
        <span class="text-[var(--text-muted)] font-medium" data-i18n="total_label">總計 Total</span>
        <span class="text-2xl font-bold serif text-[var(--accent-red)]" id="checkout-total">$0</span>
      </div>
      <button
        class="w-full bg-[var(--accent-red)] text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-red-900/20 active:scale-[0.98] transition-transform"
        data-i18n="submit_label" id="submit-order-btn" onclick="submitOrder()">
        確認送出
      </button>
    </div>
  </div>

  <div id="loading-overlay" class="fixed inset-0 bg-black/20 z-[110] hidden flex items-center justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
      <div class="w-10 h-10 border-4 border-[var(--accent-red)] border-t-transparent rounded-full animate-spin mb-4">
      </div>
      <p class="text-sm font-medium text-[var(--text-main)]" data-i18n="submitting">送出中...</p>
    </div>
  </div>

  <div class="fixed inset-0 bg-[var(--bg-cream)] z-[100] hidden flex-col items-center justify-center text-center p-8"
    id="success-screen">
    <div
      class="w-20 h-20 bg-[var(--accent-red)] rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-red-900/20 animate-[bounce_1s_ease-out]">
      <span class="material-symbols-outlined text-4xl">check</span>
    </div>
    <h2 class="serif text-2xl font-bold mb-2 text-[var(--text-main)]" data-i18n="order_sent">訂單已送出!</h2>
    <p class="text-[var(--text-muted)] mb-8 text-sm leading-relaxed" data-i18n="order_sent_desc">廚房正在為您準備餐點<br />請稍候片刻
    </p>
    <div
      class="bg-white p-6 rounded-2xl border border-[var(--bg-cream-dark)] w-full max-w-xs mb-8 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-[var(--accent-red)]"></div>
      <p class="text-xs text-[var(--text-muted)] uppercase tracking-widest mb-1">Order ID</p>
      <p class="text-3xl font-mono font-bold text-[var(--text-main)] tracking-wider" id="success-order-id">#------</p>
    </div>
    <button
      class="bg-[var(--text-main)] text-white px-8 py-3 rounded-xl font-medium active:scale-95 transition-transform"
      data-i18n="continue_ordering" onclick="resetOrder()">
      繼續點餐
    </button>
  </div>

  <script>
    const API_BASE = "https://ordering-backend.vercel.app";
    const tableId = new URLSearchParams(location.search).get("table") || "外帶";
    document.getElementById("header-table-info").textContent = `桌號 · ${tableId}`;

    let menuData = [];
    let cart = {};
    let currentCategory = 'all';
    let guestCount = 1;
    let pendingItemId = null;
    let currentLang = 'zh';

    const translations = {
      zh: {
        loading: '載入菜單中...', submitting: '送出中...',
        total: 'Total', total_label: '總計 Total', view_order: '查看訂單', upsell_title: '升級套餐?', upsell_desc: '搭配飲品或小菜更划算', drink: '經典飲品', side: '精緻小菜', submit_label: '確認送出',
        my_order: '我的訂單', note: '備註 Note', guest_count: '用餐人數', order_sent: '訂單已送出!', order_sent_desc: '廚房正在為您準備餐點<br/>請稍候片刻', continue_ordering: '繼續點餐',
        add_to_cart: '加入購物車', no_thanks: '不用了，謝謝', upsell_drink_desc: 'Drink (+$30)', upsell_side_desc: 'Side Dish (+$50)', all: '全部'
      },
      en: {
        loading: 'Loading menu...', submitting: 'Submitting...',
        total: 'Total', total_label: 'Total', view_order: 'View Order', upsell_title: 'Upgrade Set?', upsell_desc: 'Better value with drinks or sides', drink: 'Drink', side: 'Side Dish', submit_label: 'Submit Order',
        my_order: 'My Order', note: 'Note', guest_count: 'Guests', order_sent: 'Order Sent!', order_sent_desc: 'Kitchen is preparing your meal.<br/>Please wait a moment.', continue_ordering: 'Continue Ordering',
        add_to_cart: 'Add to Cart', no_thanks: 'No Thanks', upsell_drink_desc: 'Drink (+$30)', upsell_side_desc: 'Side Dish (+$50)', all: 'All'
      },
      jp: {
        loading: 'メニューを読み込み中...', submitting: '送信中...',
        total: '合計', total_label: '合計', view_order: '注文を見る', upsell_title: 'セットにアップグレード？', upsell_desc: 'ドリンクやサイドメニューでお得に', drink: 'ドリンク', side: 'サイドディッシュ', submit_label: '送信',
        my_order: '注文内容', note: '備考 Note', guest_count: '人数', order_sent: '注文完了!', order_sent_desc: 'お食事を準備しています。<br/>少々お待ちください。', continue_ordering: '注文を続ける',
        add_to_cart: 'カートに追加', no_thanks: 'いいえ、結構です', upsell_drink_desc: 'ドリンク (+$30)', upsell_side_desc: 'サイドメニュー (+$50)', all: 'すべて'
      },
      ko: {
        loading: '메뉴를 불러오는 중...', submitting: '전송 중...',
        total: '합계', total_label: '합계', view_order: '주문 보기', upsell_title: '세트 업그레이드?', upsell_desc: '음료나 사이드 메뉴를 추가해 보세요', drink: '음료', side: '사이드 메뉴', submit_label: '확인',
        my_order: '내 주문', note: '비고 Note', guest_count: '인원수', order_sent: '주문 완료!', order_sent_desc: '주방에서 식사를 준비 중입니다.<br/>잠시만 기다려 주세요.', continue_ordering: '주문 계속하기',
        add_to_cart: '장바구니 담기', no_thanks: '괜찮습니다', upsell_drink_desc: '음료 (+$30)', upsell_side_desc: '사이드 메뉴 (+$50)', all: '전체'
      }
    };

    function switchLang(lang) {
      currentLang = lang;
      document.querySelectorAll('#header-logo + div button').forEach(btn => {
        btn.className = "px-3 py-1 rounded-full text-xs font-medium text-[var(--text-muted)] hover:bg-white/80 transition-colors";
      });
      const activeBtn = document.getElementById(`lang-${lang}`);
      if (activeBtn) activeBtn.className = "px-3 py-1 rounded-full text-xs font-medium bg-[var(--accent-red)] text-white transition-colors";

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          if (el.tagName === 'P' && translations[lang][key].includes('<br/>')) {
            el.innerHTML = translations[lang][key];
          } else {
            el.textContent = translations[lang][key];
          }
        }
      });
      renderCategories();
      renderMenu();
      updateCartUI();
    }

    async function loadMenu() {
      try {
        const res = await fetch(`${API_BASE}/api/menu`);
        const data = await res.json();
        menuData = data.items;
        document.getElementById("restaurant-name-display").textContent = data.restaurant_name || "叙叙 chat chat";
        document.title = data.restaurant_name || "叙叙 chat chat";
        renderCategories();
        renderMenu();
      } catch (e) {
        document.getElementById("menu-sections").innerHTML =
          `<div class="error-screen">無法載入菜單<br/>請確認 API_BASE 或網路連線</div>`;
      }
    }

    function getLocalizedContent(item, field) {
      if (currentLang === 'zh') return item[field];
      return item[`${field}_${currentLang}`] || item[field];
    }

    function renderCategories() {
      const uniqueCats = [...new Set(menuData.map(i => i.category))];
      const nav = document.getElementById('tabs-wrap');
      let allText = translations[currentLang].all;
      let html = `<button class="px-5 py-2 rounded-full text-sm font-medium shadow-sm transition-all ${currentCategory === 'all' ? 'bg-[var(--text-main)] text-[var(--bg-cream)]' : 'bg-white text-[var(--text-muted)] border border-[var(--bg-cream-dark)]'}" onclick="setCategory('all')">${allText}</button>`;
      uniqueCats.forEach(catKey => {
        html += `<button class="px-5 py-2 rounded-full text-sm font-medium shadow-sm transition-all ${currentCategory === catKey ? 'bg-[var(--text-main)] text-[var(--bg-cream)]' : 'bg-white text-[var(--text-muted)] border border-[var(--bg-cream-dark)]'}" onclick="setCategory('${catKey}')">${catKey}</button>`;
      });
      nav.innerHTML = html;
    }

    function setCategory(cat) { currentCategory = cat; renderCategories(); renderMenu(); }

    function renderMenu() {
      const container = document.getElementById('menu-sections');
      const filtered = currentCategory === 'all' ? menuData : menuData.filter(i => i.category === currentCategory);
      if (filtered.length === 0) { container.innerHTML = `<div class="text-center py-20 text-[var(--text-muted)]">暫無餐點</div>`; return; }

      container.innerHTML = `<div class="grid grid-cols-1 gap-4 pb-24">${filtered.map(item => {
        const qty = Object.values(cart).reduce((sum, cartItem) => {
          return cartItem.item.id === item.id ? sum + cartItem.qty : sum;
        }, 0);
        const displayName = getLocalizedContent(item, 'name');
        const soldOut = item.available === false;

        return `<div class="bg-white p-4 rounded-2xl flex gap-4 card-shadow relative overflow-hidden ${soldOut ? 'opacity-60' : ''}">
                ${soldOut ? '<div class="absolute inset-0 bg-white/40 z-10 flex items-center justify-center"><span class="bg-gray-800 text-white text-xs px-2 py-1 rounded" data-i18n="sold_out">Sold Out</span></div>' : ''}
                <div class="w-24 h-24 bg-gray-100 rounded-xl flex-shrink-0 flex items-center justify-center text-4xl">${item.emoji || '🍽️'}</div>
                <div class="flex-1 flex flex-col justify-between min-w-0">
                    <div>
                        <h3 class="serif font-bold text-lg truncate text-[var(--text-main)]">${displayName}</h3>
                        <p class="text-xs text-[var(--text-muted)] line-clamp-2 mt-1">${getLocalizedContent(item, 'description') || ''}</p>
                    </div>
                    <div class="flex items-end justify-between mt-2">
                        <div class="font-bold text-[var(--accent-red)] text-lg">$${item.price}</div>
                        ${soldOut ? '' : `
                        <div class="flex items-center gap-3">
                            ${qty > 0 ? `<span class="bg-[var(--accent-red-light)] text-[var(--accent-red)] text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">${qty}</span>` : ''}
                            <button class="w-8 h-8 bg-[var(--accent-red)] text-white rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-md shadow-red-900/10" onclick="initAddItem('${item.id}')">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                        </div>
                        `}
                    </div>
                </div>
           </div>`;
      }).join('')}</div>`;
    }

    function initAddItem(itemId) {
      const item = menuData.find(i => i.id === itemId);
      if (!item) return;
      if (item.category === '主食') {
        pendingItemId = itemId;
        openUpsell();
      } else {
        updateItemQty(itemId, 1);
      }
    }

    function openUpsell() {
      document.getElementById('upsell-overlay').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('upsell-overlay').classList.remove('opacity-0');
        document.getElementById('upsell-sheet').classList.remove('translate-y-full');
      }, 10);
      document.querySelectorAll('#upsell-sheet input[type="checkbox"]').forEach(el => el.checked = false);
    }

    function closeUpsell() {
      document.getElementById('upsell-overlay').classList.add('opacity-0');
      document.getElementById('upsell-sheet').classList.add('translate-y-full');
      setTimeout(() => {
        document.getElementById('upsell-overlay').classList.add('hidden');
      }, 300);
      pendingItemId = null;
    }

    function toggleUpsell(checkbox, price) { }

    function confirmUpsell() {
      if (pendingItemId) {
        const item = menuData.find(i => i.id === pendingItemId);
        const checkboxes = document.querySelectorAll('#upsell-sheet input[type="checkbox"]:checked');
        let addons = [];
        checkboxes.forEach(cb => {
          const priceMatch = cb.getAttribute('onchange').match(/\d+/);
          const price = priceMatch ? parseInt(priceMatch[0]) : 0;
          const type = cb.value;
          const nameKey = type === 'drink' ? 'drink' : 'side';
          const name = translations[currentLang][nameKey];
          addons.push({ name: name, price: price, type: type });
        });
        const addonKey = addons.map(a => a.type).sort().join('_');
        const cartKey = addonKey ? `${pendingItemId}_${addonKey}` : pendingItemId;
        if (!cart[cartKey]) {
          cart[cartKey] = { item: item, addons: addons, qty: 0, key: cartKey };
        }
        updateCartItemQty(cartKey, 1);
      }
      closeUpsell();
    }

    function updateCartItemQty(cartKey, delta) {
      if (cart[cartKey]) {
        cart[cartKey].qty += delta;
        if (cart[cartKey].qty <= 0) delete cart[cartKey];
        updateCartUI();
        renderMenu();
      }
    }

    function updateItemQty(itemId, delta) {
      if (!cart[itemId]) {
        const item = menuData.find(i => i.id === itemId);
        if (!item) return;
        cart[itemId] = { item: item, addons: [], qty: 0, key: itemId };
      }
      updateCartItemQty(itemId, delta);
    }

    function updateCartUI() {
      const items = Object.values(cart);
      const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
      const totalPrice = items.reduce((sum, i) => {
        const itemPrice = i.item.price;
        const addonsPrice = i.addons.reduce((acc, add) => acc + add.price, 0);
        return sum + ((itemPrice + addonsPrice) * i.qty);
      }, 0);

      document.getElementById('cart-count').textContent = totalQty;
      document.getElementById('cart-total').textContent = `$${totalPrice}`;
      document.getElementById('checkout-total').textContent = `$${totalPrice}`;

      const bar = document.getElementById('cart-bar');
      if (totalQty > 0) bar.classList.remove('translate-y-full');
      else {
        bar.classList.add('translate-y-full');
        closeCart();
      }

      document.getElementById('submit-order-btn').disabled = totalQty === 0;

      document.getElementById('cart-items-container').innerHTML = items.map(entry => {
        const displayName = getLocalizedContent(entry.item, 'name');
        const unitPrice = entry.item.price + entry.addons.reduce((a, b) => a + b.price, 0);
        return `
        <div class="flex items-start gap-4 mb-6">
            <div class="w-16 h-16 bg-gray-50 rounded-lg flex-shrink-0 flex items-center justify-center text-2xl border border-gray-100">${entry.item.emoji || '🍽️'}</div>
            <div class="flex-1 min-w-0">
                <h4 class="font-bold text-[var(--text-main)] truncate">${displayName}</h4>
                ${entry.addons.length > 0 ?
            `<div class="text-xs text-[var(--text-muted)] mt-1 space-y-0.5">
                        ${entry.addons.map(addon => `<span class="inline-block bg-[var(--bg-cream)] px-1.5 py-0.5 rounded text-[10px] mr-1">+ ${addon.name}</span>`).join('')}
                    </div>`
            : ''}
                <div class="text-[var(--accent-red)] font-medium mt-1">$${unitPrice * entry.qty}</div>
            </div>
            <div class="flex items-center gap-3 bg-gray-100 rounded-full px-2 py-1 h-8 mt-1">
                <button class="w-7 h-7 flex items-center justify-center font-bold text-[var(--text-muted)] active:text-[var(--text-main)]" onclick="updateCartItemQty('${entry.key}', -1)">−</button>
                <span class="text-sm font-bold w-4 text-center text-[var(--text-main)]">${entry.qty}</span>
                <button class="w-7 h-7 flex items-center justify-center font-bold text-[var(--text-muted)] active:text-[var(--text-main)]" onclick="updateCartItemQty('${entry.key}', 1)">+</button>
            </div>
        </div>`;
      }).join('');
    }

    function openCart() {
      document.getElementById('cart-overlay').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('cart-overlay').classList.remove('opacity-0');
        document.getElementById('cart-sheet').classList.remove('translate-y-full');
      }, 10);
    }

    function closeCart() {
      document.getElementById('cart-overlay').classList.add('opacity-0');
      document.getElementById('cart-sheet').classList.add('translate-y-full');
      setTimeout(() => {
        document.getElementById('cart-overlay').classList.add('hidden');
      }, 300);
    }

    function updateGuest(delta) { guestCount = Math.max(1, guestCount + delta); document.getElementById('guest-count').textContent = guestCount; }

    async function submitOrder() {
      const items = Object.values(cart).map(entry => {
        const unitPrice = entry.item.price + entry.addons.reduce((a, b) => a + b.price, 0);
        let name = entry.item.name;
        if (entry.addons.length > 0) {
          name += " (" + entry.addons.map(a => a.name).join("+") + ")";
        }
        return {
          menu_item_id: entry.item.id,
          name: name,
          price: unitPrice,
          qty: entry.qty
        }
      });

      if (items.length === 0) return;

      document.getElementById('loading-overlay').classList.remove('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            table_id: tableId,
            guest_count: guestCount,
            note: document.getElementById('order-note').value,
            items: items
          })
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('success-order-id').textContent = '#' + data.order_id.slice(-6).toUpperCase();
          document.getElementById('success-screen').classList.remove('hidden');
          document.getElementById('success-screen').classList.add('flex');
          closeCart();
        } else {
          alert("訂單送出失敗：" + (data.error || "請再試一次"));
        }
      } catch (e) {
        alert("網路錯誤，請確認連線後再試。");
      } finally {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    function resetOrder() {
      cart = {};
      guestCount = 1;
      document.getElementById('guest-count').textContent = '1';
      document.getElementById('order-note').value = '';
      updateCartUI();
      renderMenu();
      document.getElementById('success-screen').classList.add('hidden');
      document.getElementById('success-screen').classList.remove('flex');
    }

    loadMenu();
  </script>
</body>

</html>
